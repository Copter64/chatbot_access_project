<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - Game Server Access</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: #16213e;
            border: 1px solid #7f1d1d;
            border-radius: 12px;
            padding: 2.5rem;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .icon { font-size: 3.5rem; margin-bottom: 1rem; }
        h1 { font-size: 1.5rem; margin-bottom: 0.5rem; color: #ff5252; }
        .subtitle { color: #8899aa; font-size: 0.95rem; margin-bottom: 1.75rem; line-height: 1.6; }
        .hint {
            background: #2a1a1a;
            border: 1px solid #7f1d1d;
            border-radius: 8px;
            padding: 1rem 1.25rem;
            font-size: 0.85rem;
            color: #8899aa;
            line-height: 1.6;
            text-align: left;
        }
        .hint strong { color: #b0c4de; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">❌</div>
        <h1>{{ error_title }}</h1>
        <p class="subtitle">{{ error_message }}</p>

        <div class="hint">
            <strong>Need a new link?</strong><br>
            Go to your Discord server and run the
            <strong>/request-access</strong> command to receive a fresh link.
            Links expire after a short time and can only be used once.
        </div>
    </div>
</body>
</html>
